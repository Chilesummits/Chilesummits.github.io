experience:
  - role: Profesor Asociado
    org: Centro Bahía Lomas, Universidad Santo Tomás, Chile
    start: 2023-01-01
    summary: |
      Investigación en dinámicas poblacionales y ecología espacial de aves en
      Magallanes. Docente del programa de Doctorado en Conservación y Gestión de la
      Biodiversidad, con guiado de tesistas y docencia en asignaturas del doctorado.
  - role: Coordinador del Programa de Monitoreo de Aves
    org: Red de Observadores de Aves y Vida Silvestre de Chile (ROC)
    start: 2019-01-01
    summary: |
      Diseño del Plan General de Monitoreo de Aves de Chile (licitado por el Ministerio
      del Medio Ambiente) y liderazgo del monitoreo de largo plazo de aves acuáticas en
      la Laguna Batuco, censos de Piuquenes en Lampa-Quilicura y monitoreo del Pilpilén
      común en la desembocadura del río Maipo. Lidera los esfuerzos de anillamiento de
      la ROC y participa como revisor de datos de eBird a nivel nacional.
  - role: Investigador Postdoctoral
    org: Centro Internacional Cabo de Hornos (CHIC), Chile — laboratorio de Dr. Rodrigo Vásquez
    start: 2022-01-01
    end: 2022-12-31
    summary: |
      Dinámicas poblacionales y ecología de aves de bosques de la Patagonia utilizando
      la base de datos de marca-recaptura del Parque Etnobotánico Omora, Isla Navarino.
  - role: Becario Postdoctoral
    org: Swiss Ornithological Institute — Vogelwarte
    start: 2021-01-01
    end: 2022-06-30
    summary: |
      Beca de 6 meses con Marc Kéry y Michael Schaub. Especialización en métodos
      Bayesianos para estimar tasas de supervivencia a nivel específico y comunitario, y
      desarrollo de modelos Dail-Madsen para estimar la abundancia temporal del Canquén
      Colorado usando censos anuales de dos décadas en Magallanes.
  - role: Investigador Postdoctoral
    org: Instituto de Ecología y Biodiversidad (IEB), Universidad de Chile — laboratorio de Dr. Rodrigo Vásquez
    start: 2020-01-01
    end: 2022-12-31
    summary: |
      Investigación de la variación temporal en parámetros demográficos y fenológicos de
      aves de bosque usando una base de datos de anillamiento de 20 años del Parque
      Etnobotánico Omora, Isla Navarino.
  - role: Investigador Doctoral
    org: Departamento de Zoología, University of Oxford
    start: 2014-01-01
    end: 2018-12-31
    summary: |
      Análisis de supervivencia con marca-recaptura, meta-análisis filogenético del
      efecto insular sobre el crecimiento de aves, monitoreo de nidos y modelamiento de
      proyección integral de una población insular de aves (*Zosterops lateralis*) en
      Queensland, Australia.

