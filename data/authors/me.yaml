experience:
  - role: Profesor Asociado
    org: Centro Bahía Lomas, Universidad Santo Tomás, Chile
    start: 2023-01-01
    summary: |
      Research on population dynamics and spatial ecology of birds in Magallanes.
      Faculty member of the Doctorado en Conservación y Gestión de la Biodiversidad,
      supervising thesis students and teaching doctoral courses.
  - role: Coordinador del Programa de Monitoreo de Aves
    org: Red de Observadores de Aves y Vida Silvestre de Chile (ROC)
    start: 2019-01-01
    summary: |
      Designed Chile's national bird monitoring plan (commissioned by the Ministry of
      the Environment) and led long-term waterbird monitoring at Laguna Batuco, Andean
      Goose censuses in Lampa-Quilicura, and American Oystercatcher monitoring at the
      Maipo river mouth. Leads ROC's bird banding efforts and reviews eBird records
      nationally.
  - role: Postdoctoral Researcher
    org: Centro Internacional Cabo de Hornos (CHIC), Chile — Dr. Rodrigo Vásquez lab
    start: 2022-01-01
    end: 2022-12-31
    summary: |
      Population dynamics and ecology of Patagonian forest birds using the
      Omora Ethnobotanical Park mark-recapture database, Navarino Island.
  - role: Postdoctoral Fellow
    org: Swiss Ornithological Institute — Vogelwarte
    start: 2021-01-01
    end: 2022-06-30
    summary: |
      6-month fellowship with Marc Kéry and Michael Schaub. Specialized in Bayesian
      methods for species- and community-level survival estimation, and developed
      Dail-Madsen models to estimate temporal abundance of the Ruddy-headed Goose
      from two decades of annual censuses in Magallanes.
  - role: Postdoctoral Researcher
    org: Instituto de Ecología y Biodiversidad (IEB), Universidad de Chile — Dr. Rodrigo Vásquez lab
    start: 2020-01-01
    end: 2022-12-31
    summary: |
      Investigated temporal variation in demographic and phenological parameters of
      forest birds using a 20-year banding dataset from the Omora Ethnobotanical Park,
      Navarino Island.
  - role: PhD Researcher
    org: Department of Zoology, University of Oxford
    start: 2014-01-01
    end: 2018-12-31
    summary: |
      Mark-recapture survival analysis, phylogenetic meta-analysis of insularity effects
      on avian growth, nest monitoring, and integral projection modeling of an insular
      bird population (*Zosterops lateralis*) in Queensland, Australia.

